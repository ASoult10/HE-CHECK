name: CD - Despliegue Continuo (main → Azure Function)

on:
  push:
    branches:
      - main
    paths:
      - 'ai-function/**'

jobs:
  deploy_function:
    name: Desplegar Función en Azure Function
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy a Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: he-check-function
          package: ai-function
          publish-profile: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}