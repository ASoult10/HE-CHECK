name: CD - Despliegue Continuo (main → Azure Static Web App)

on:
  workflow_run:
    workflows: ["CI - Integración Continua (Tests React)"]
    types:
      - completed

jobs:
  deploy_frontend:
    name: Desplegar Frontend en Azure Static Web App
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    timeout-minutes: 15

    steps:

      - name: Descargar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy a Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_AZURE_FUNCTION_ENDPOINT: ${{ secrets.VITE_AZURE_FUNCTION_ENDPOINT }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "he-check"
          output_location: "dist"
          app_build_command: "npm run build"
          skip_api_build: true