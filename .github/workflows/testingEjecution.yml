name: CI - Integración Continua (Tests React)

on:
  push:
    branches:
      - main

jobs:
  tests_frontend:
    name: Ejecutar Tests de React
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Descargar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: he-check/package-lock.json

      - name: Instalar dependencias
        working-directory: he-check
        run: npm ci

      - name: Ejecutar tests
        working-directory: he-check
        run: npm test

      - name: Construir Build de Frontend
        working-directory: he-check
        run: npm run build