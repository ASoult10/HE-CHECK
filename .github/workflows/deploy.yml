name: CD - Despliegue Continuo (main → Azure Static Web App)

on:
  push:
    branches:
      - main

jobs:
  deploy_frontend:
    name: Desplegar Frontend en Azure Static Web App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy a Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "he-check"
          output_location: "dist"
          app_build_command: "npm run build"
          skip_api_build: true